<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PRO FIRE 動態退休推估引擎</title>
    <!-- 引入 FontAwesome 圖示庫 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- 引入 Chart.js 圖表庫 -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap');

        :root {
            --bg-dark: #0b0f19;
            --bg-card: #151f32;
            --bg-input: #0b0f19;
            
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            
            --accent-cyan: #06b6d4;
            --accent-blue: #3b82f6;
            --accent-green: #10b981;
            --accent-danger: #f43f5e;
            --accent-warning: #f59e0b;

            --border: #273549;
            --glow-cyan: 0 0 15px rgba(6, 182, 212, 0.35);
            --glow-green: 0 0 15px rgba(16, 185, 129, 0.35);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', 'Noto Sans TC', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            line-height: 1.5;
            padding: 12px;
            overflow-x: hidden; /* 徹底防止手機版右側白邊與破版 */
            background-image: 
                radial-gradient(circle at 10% 30%, rgba(6, 182, 212, 0.02), transparent 30%),
                radial-gradient(circle at 90% 70%, rgba(16, 185, 129, 0.02), transparent 30%);
        }

        /* 主容器：桌機雙欄，手機自動轉單欄 */
        .container {
            max-width: 1350px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 380px 1fr;
            gap: 16px;
            width: 100%;
        }

        /* 關鍵修正：確保 Grid 子元素在手機板不會因為 Canvas 或 Table 撐開爆版 */
        aside, main {
            min-width: 0;
            width: 100%;
        }

        @media (max-width: 1024px) {
            .container {
                grid-template-columns: 1fr; /* 轉為直向單欄適應直屏幕 */
            }
        }

        /* 頂部標題列 */
        header {
            grid-column: 1 / -1;
            padding: 12px 4px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border);
            flex-wrap: wrap;
            gap: 10px;
        }

        .header-title {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        header i.fa-rocket {
            font-size: 1.8rem;
            color: var(--accent-cyan);
            text-shadow: var(--glow-cyan);
        }

        header h1 {
            font-size: 1.4rem;
            font-weight: 800;
            background: linear-gradient(90deg, #06b6d4, #3b82f6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        header p {
            color: var(--text-muted);
            font-size: 0.8rem;
            background: rgba(39, 53, 73, 0.4);
            padding: 4px 10px;
            border-radius: 20px;
            border: 1px solid var(--border);
        }

        /* 卡片主體 */
        .card {
            background: var(--bg-card);
            border-radius: 14px;
            padding: 16px;
            border: 1px solid var(--border);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            margin-bottom: 16px;
            width: 100%;
            min-width: 0;
        }

        .card h2 {
            font-size: 1.05rem;
            color: var(--text-main);
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid rgba(39, 53, 73, 0.5);
            padding-bottom: 8px;
        }

        /* 表單排版 */
        .input-grid-two-col {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        @media (max-width: 480px) {
            .input-grid-two-col {
                grid-template-columns: 1fr; /* 手機直向時全面堆疊 */
            }
        }

        .input-group {
            margin-bottom: 14px;
        }

        .input-group label {
            display: block;
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-bottom: 5px;
            font-weight: 500;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 8px;
            transition: all 0.2s ease;
        }

        .input-wrapper:focus-within {
            border-color: var(--accent-cyan);
            box-shadow: 0 0 0 2px rgba(6, 182, 212, 0.15);
        }

        .input-icon {
            padding-left: 10px;
            color: var(--text-muted);
            font-size: 0.9rem;
            width: 32px;
            text-align: center;
        }

        .input-wrapper input {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-main);
            font-size: 1rem;
            padding: 10px 8px;
            font-weight: 600;
            width: 100%;
            -moz-appearance: textfield;
        }

        .input-wrapper input::-webkit-outer-spin-button,
        .input-wrapper input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        .input-wrapper input:focus {
            outline: none;
        }

        .input-unit {
            padding-right: 12px;
            font-size: 0.8rem;
            font-weight: 700;
            color: var(--accent-cyan);
            white-space: nowrap;
        }
        
        .input-unit.percent {
            color: var(--accent-warning);
        }

        /* 關鍵修正：數據儀表板 (極致適應直屏幕) */
        .summary-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-bottom: 16px;
        }

        .summary-box {
            background: rgba(11, 15, 25, 0.4);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 12px;
            text-align: center;
        }

        .summary-box.highlight {
            border-color: rgba(16, 185, 129, 0.3);
            background: linear-gradient(135deg, rgba(16, 185, 129, 0.04), rgba(6, 182, 212, 0.04));
        }

        .summary-box i {
            font-size: 1.1rem;
            margin-bottom: 4px;
            color: var(--text-muted);
        }

        .summary-box.highlight i { color: var(--accent-green); }

        .summary-box .title {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-bottom: 4px;
        }

        .summary-box .value {
            font-size: 1.2rem;
            font-weight: 800;
            color: var(--text-main);
            word-break: break-all;
        }

        .summary-box.highlight .value { color: var(--accent-green); }

        /* 當螢幕小於 600px (手機直向) 時，將儀表板改為「橫向條狀清單」，完美防止字體被切斷 */
        @media (max-width: 600px) {
            .summary-grid {
                grid-template-columns: 1fr; /* 徹底放棄多欄，改為單欄一條一條排列 */
                gap: 8px;
            }
            .summary-box {
                display: flex;
                align-items: center;
                justify-content: space-between;
                text-align: left;
                padding: 10px 14px;
            }
            .summary-box i {
                margin-bottom: 0;
                margin-right: 10px;
                font-size: 1rem;
                width: 20px;
            }
            .summary-box .title {
                margin-bottom: 0;
                font-size: 0.85rem;
                flex: 1;
            }
            .summary-box .value {
                font-size: 1.1rem;
                text-align: right;
            }
        }

        /* 圖表容器 */
        .chart-container {
            height: 240px;
            width: 100%;
            position: relative;
        }

        /* 表格響應式優化 */
        .table-responsive {
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            max-height: 400px;
            border-radius: 8px;
            border: 1px solid var(--border);
            width: 100%;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.8rem;
            text-align: right;
            min-width: 600px; /* 確保表格在手機上有足夠空間滾動，字不會擠成一團 */
        }

        th {
            background-color: #0b0f19;
            color: var(--accent-cyan);
            padding: 10px;
            position: sticky;
            top: 0;
            z-index: 10;
            font-weight: 600;
            border-bottom: 2px solid var(--border);
        }

        td {
            padding: 8px 10px;
            border-bottom: 1px solid rgba(39, 53, 73, 0.3);
            color: var(--text-main);
        }

        tbody tr:hover {
            background-color: rgba(59, 130, 246, 0.03);
        }

        th:first-child, td:first-child { text-align: center; }
        th:last-child, td:last-child { text-align: center; }

        .status-safe {
            color: var(--accent-green);
            font-weight: 600;
        }
        .status-danger {
            color: var(--accent-danger);
            font-weight: 600;
        }

        .notice-info {
            font-size: 0.7rem;
            color: var(--text-muted);
            margin-top: 8px;
            display: flex;
            align-items: center;
            gap: 4px;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div class="header-title">
            <i class="fa-solid fa-rocket"></i>
            <h1>PRO FIRE 動態退休推估引擎</h1>
        </div>
        <p><i class="fa-solid fa-mobile-screen-button"></i> 完美直向屏幕自適應版</p>
    </header>

    <!-- 左側：參數設定 -->
    <aside>
        <div class="card">
            <h2><i class="fa-solid fa-sliders"></i> 策略參數設定</h2>
            
            <div class="input-grid-two-col">
                <div class="input-group">
                    <label>目前年齡</label>
                    <div class="input-wrapper">
                        <i class="fa-regular fa-user input-icon"></i>
                        <input type="number" id="currentAge" value="55" inputmode="numeric">
                        <span class="input-unit">歲</span>
                    </div>
                </div>

                <div class="input-group">
                    <label>預估壽命</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-heart-pulse input-icon"></i>
                        <input type="number" id="lifeExpectancy" value="85" inputmode="numeric">
                        <span class="input-unit">歲</span>
                    </div>
                </div>
            </div>

            <div class="input-group">
                <label>目標資產終值</label>
                <div class="input-wrapper">
                    <i class="fa-solid fa-crosshairs input-icon"></i>
                    <input type="number" id="targetAsset" value="2000" inputmode="numeric">
                    <span class="input-unit">萬元</span>
                </div>
            </div>

            <div class="input-group">
                <label>目前投資組合市值</label>
                <div class="input-wrapper">
                    <i class="fa-solid fa-wallet input-icon"></i>
                    <input type="number" id="currentAsset" value="1000" inputmode="numeric">
                    <span class="input-unit">萬元</span>
                </div>
            </div>

            <div class="input-group">
                <label>預計每年再投入金額</label>
                <div class="input-wrapper">
                    <i class="fa-solid fa-coins input-icon"></i>
                    <input type="number" id="annualInvestment" value="25" inputmode="numeric">
                    <span class="input-unit">萬元</span>
                </div>
            </div>

            <div class="input-grid-two-col">
                <div class="input-group">
                    <label>投資加權報酬率</label>
                    <div class="input-wrapper">
                        <input type="number" id="portfolioReturn" value="7.0" step="0.1" inputmode="decimal" style="padding-left:12px;">
                        <span class="input-unit percent">%</span>
                    </div>
                </div>

                <div class="input-group">
                    <label>預估通貨膨脹率</label>
                    <div class="input-wrapper">
                        <input type="number" id="inflationRate" value="2.0" step="0.1" inputmode="decimal" style="padding-left:12px;">
                        <span class="input-unit percent">%</span>
                    </div>
                </div>

                <div class="input-group">
                    <label>退休安全提領率</label>
                    <div class="input-wrapper">
                        <input type="number" id="withdrawalRate" value="4.0" step="0.1" inputmode="decimal" style="padding-left:12px;">
                        <span class="input-unit percent">%</span>
                    </div>
                </div>

                <div class="input-group">
                    <label>退休後保守報酬率</label>
                    <div class="input-wrapper">
                        <input type="number" id="postRetirementReturn" value="6.0" step="0.1" inputmode="decimal" style="padding-left:12px;">
                        <span class="input-unit percent">%</span>
                    </div>
                </div>
            </div>
            
            <div class="notice-info">
                <i class="fa-solid fa-circle-info"></i> 金額單位均為「萬元」，欄位支援純數字鍵盤。
            </div>
        </div>
    </aside>

    <!-- 右側：結果與圖表 -->
    <main>
        <!-- 結果摘要 -->
        <div class="card">
            <h2><i class="fa-solid fa-chart-pie"></i> 退休推估結果</h2>
            <div class="summary-grid">
                <div class="summary-box">
                    <i class="fa-solid fa-hourglass-half"></i>
                    <div class="title">所需年數</div>
                    <div class="value" id="resYears">0.0 年</div>
                </div>
                <div class="summary-box highlight">
                    <i class="fa-solid fa-flag-checkered"></i>
                    <div class="title">可退休年齡</div>
                    <div class="value" id="resRetireAge">0 歲</div>
                </div>
                <div class="summary-box">
                    <i class="fa-solid fa-sack-dollar"></i>
                    <div class="title">目標終值 (今日)</div>
                    <div class="value" id="resTargetToday">$0</div>
                </div>
                <div class="summary-box highlight">
                    <i class="fa-solid fa-hand-holding-dollar"></i>
                    <div class="title">首年提領 (今日)</div>
                    <div class="value" id="resFirstWithdrawalToday">$0</div>
                </div>
            </div>

            <!-- 動態折線圖 -->
            <div class="chart-container">
                <canvas id="wealthChart"></canvas>
            </div>
        </div>

        <!-- 提領動態表 -->
        <div class="card">
            <h2><i class="fa-solid fa-table"></i> 退休後資金水位模擬表</h2>
            <div class="table-responsive">
                <table>
                    <thead>
                        <tr>
                            <th>年齡</th>
                            <th>年初資金</th>
                            <th>當年提領 (隨通膨)</th>
                            <th>實質購買力 (今日)</th>
                            <th>投資利息</th>
                            <th>年底剩餘</th>
                            <th>狀態</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                        <!-- 動態生成 -->
                    </tbody>
                </table>
            </div>
        </div>
    </main>
</div>

<script>
    const formatCurrency = (value) => {
        if (value >= 10000) {
            return '$' + (value / 10000).toFixed(1) + '萬';
        }
        return '$' + Math.round(value);
    };

    let wealthChart = null;

    function initChart() {
        const ctx = document.getElementById('wealthChart').getContext('2d');
        Chart.defaults.color = '#94a3b8';
        
        wealthChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: [],
                datasets: [{
                    label: '年底剩餘資金',
                    data: [],
                    borderColor: '#06b6d4',
                    backgroundColor: 'rgba(6, 182, 212, 0.05)',
                    borderWidth: 2,
                    fill: true,
                    tension: 0.2,
                    pointRadius: 0,
                    pointHitRadius: 15,
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: { display: false },
                    tooltip: {
                        mode: 'index',
                        intersect: false,
                        callbacks: {
                            label: function(context) {
                                return ' 剩餘資金: ' + formatCurrency(context.parsed.y);
                            }
                        }
                    }
                },
                scales: {
                    x: { grid: { color: '#273549', drawBorder: false } },
                    y: { 
                        grid: { color: '#273549', drawBorder: false },
                        ticks: { callback: function(value) { return value / 10000 + '萬'; } }
                    }
                }
            }
        });
    }

    function calculate() {
        const currentAge = parseFloat(document.getElementById('currentAge').value) || 0;
        const targetAsset = (parseFloat(document.getElementById('targetAsset').value) || 0) * 10000;
        const currentAsset = (parseFloat(document.getElementById('currentAsset').value) || 0) * 10000;
        const annualInvestment = (parseFloat(document.getElementById('annualInvestment').value) || 0) * 10000;
        
        const portfolioReturn = (parseFloat(document.getElementById('portfolioReturn').value) || 0) / 100;
        const inflationRate = (parseFloat(document.getElementById('inflationRate').value) || 0) / 100;
        const withdrawalRate = (parseFloat(document.getElementById('withdrawalRate').value) || 0) / 100;
        const postRetirementReturn = (parseFloat(document.getElementById('postRetirementReturn').value) || 0) / 100;
        
        const lifeExpectancy = parseFloat(document.getElementById('lifeExpectancy').value) || 0;

        let yearsToTarget = 0;
        if (currentAsset < targetAsset) {
            if (portfolioReturn > 0) {
                const numerator = targetAsset + (annualInvestment / portfolioReturn);
                const denominator = currentAsset + (annualInvestment / portfolioReturn);
                if (numerator / denominator > 0) {
                    yearsToTarget = Math.log(numerator / denominator) / Math.log(1 + portfolioReturn);
                    yearsToTarget = Math.ceil(yearsToTarget * 10) / 10;
                } else { yearsToTarget = Infinity; }
            } else {
                yearsToTarget = Math.ceil(((targetAsset - currentAsset) / annualInvestment) * 10) / 10;
            }
        }

        const retirementAge = currentAge + yearsToTarget;
        const targetInTodayMoney = targetAsset / Math.pow(1 + inflationRate, yearsToTarget);
        const firstYearWithdrawal = targetAsset * withdrawalRate;
        const firstYearWithdrawalToday = firstYearWithdrawal / Math.pow(1 + inflationRate, yearsToTarget);

        document.getElementById('resYears').innerText = isFinite(yearsToTarget) ? `${yearsToTarget.toFixed(1)} 年` : '無法達成';
        document.getElementById('resRetireAge').innerText = isFinite(retirementAge) ? `${retirementAge.toFixed(1)} 歲` : '-';
        document.getElementById('resTargetToday').innerText = isFinite(targetInTodayMoney) ? formatCurrency(targetInTodayMoney) : '-';
        document.getElementById('resFirstWithdrawalToday').innerText = isFinite(firstYearWithdrawalToday) ? formatCurrency(firstYearWithdrawalToday) : '-';

        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = '';
        
        let chartLabels = [];
        let chartData = [];

        if (!isFinite(retirementAge) || retirementAge > lifeExpectancy) {
            tbody.innerHTML = '<tr><td colspan="7" style="text-align:center; padding: 25px; color: var(--accent-danger);">無法在預估壽命內達標，請檢視參數設定。</td></tr>';
            if(wealthChart) { wealthChart.data.labels = []; wealthChart.data.datasets[0].data = []; wealthChart.update(); }
            return;
        }

        let startAge = Math.floor(retirementAge);
        let balance = targetAsset;
        let currentWithdrawal = firstYearWithdrawal;
        let htmlContent = '';

        for (let age = startAge; age <= lifeExpectancy; age++) {
            const withdrawalToday = currentWithdrawal / Math.pow(1 + inflationRate, (age - currentAge));
            const returnAmount = Math.max(0, balance - currentWithdrawal) * postRetirementReturn;
            const endBalance = balance - currentWithdrawal + returnAmount;
            
            const isSafe = endBalance > 0;
            const statusLabel = isSafe ? '<span class="status-safe">Safe</span>' : '<span class="status-danger">耗盡</span>';

            htmlContent += `
                <tr>
                    <td>${age}</td>
                    <td>${formatCurrency(Math.max(0, balance))}</td>
                    <td style="color: var(--accent-danger);">${formatCurrency(currentWithdrawal)}</td>
                    <td style="color: var(--accent-warning);">${formatCurrency(withdrawalToday)}</td>
                    <td style="color: var(--accent-green);">${formatCurrency(returnAmount)}</td>
                    <td style="font-weight: 700;">${formatCurrency(Math.max(0, endBalance))}</td>
                    <td>${statusLabel}</td>
                </tr>
            `;

            chartLabels.push(age + '歲');
            chartData.push(Math.max(0, endBalance));

            balance = endBalance;
            currentWithdrawal = currentWithdrawal * (1 + inflationRate);
        }

        tbody.innerHTML = htmlContent;

        if(wealthChart) {
            wealthChart.data.labels = chartLabels;
            wealthChart.data.datasets[0].data = chartData;
            if (chartData[chartData.length - 1] <= 0) {
                wealthChart.data.datasets[0].borderColor = '#f43f5e';
                wealthChart.data.datasets[0].backgroundColor = 'rgba(244, 63, 94, 0.05)';
            } else {
                wealthChart.data.datasets[0].borderColor = '#06b6d4';
                wealthChart.data.datasets[0].backgroundColor = 'rgba(6, 182, 212, 0.05)';
            }
            wealthChart.update();
        }
    }

    document.querySelectorAll('input[type="number"]').forEach(input => {
        input.addEventListener('input', calculate);
    });

    window.onload = () => {
        initChart();
        calculate();
    };
</script>

</body>
</html>
