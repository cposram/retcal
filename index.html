<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FIRE 動態退休提領推估儀表板</title>
    <style>
        :root {
            --primary: #2c3e50;
            --secondary: #2980b9;
            --success: #27ae60;
            --danger: #e74c3c;
            --background: #f4f7f6;
            --surface: #ffffff;
            --text-main: #333333;
            --text-muted: #7f8c8d;
            --border: #e0e6ed;
            --input-bg: #fff9c4; /* 匹配原本 Excel 黃底可修改的感覺 */
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', 'Microsoft JhengHei', sans-serif;
        }

        body {
            background-color: var(--background);
            color: var(--text-main);
            line-height: 1.6;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 350px 1fr;
            gap: 20px;
        }

        @media (max-width: 900px) {
            .container {
                grid-template-columns: 1fr;
            }
        }

        header {
            grid-column: 1 / -1;
            background-color: var(--primary);
            color: white;
            padding: 20px 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            text-align: center;
        }

        header h1 {
            font-size: 1.8rem;
            margin-bottom: 5px;
        }

        header p {
            color: #bdc3c7;
            font-size: 0.95rem;
        }

        .card {
            background: var(--surface);
            border-radius: 8px;
            padding: 25px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            border: 1px solid var(--border);
        }

        .card h2 {
            color: var(--primary);
            font-size: 1.25rem;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid var(--secondary);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .input-group {
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
        }

        .input-group label {
            font-weight: 600;
            margin-bottom: 5px;
            color: #34495e;
            font-size: 0.9rem;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-wrapper span {
            position: absolute;
            left: 10px;
            color: var(--text-muted);
        }

        .input-wrapper input {
            width: 100%;
            padding: 10px 10px 10px 30px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 1rem;
            background-color: var(--input-bg);
            transition: all 0.3s ease;
        }

        .input-wrapper input:focus {
            outline: none;
            border-color: var(--secondary);
            box-shadow: 0 0 0 2px rgba(41, 128, 185, 0.2);
        }

        /* 針對沒有前綴圖標的輸入框 */
        .input-group.no-icon .input-wrapper input {
            padding-left: 10px;
        }

        /* 結果摘要區塊 */
        .summary-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .summary-box {
            background-color: #e8f4f8;
            padding: 20px;
            border-radius: 8px;
            border-left: 4px solid var(--secondary);
        }

        .summary-box.success {
            background-color: #e8f8f5;
            border-left-color: var(--success);
        }

        .summary-box .title {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 5px;
            font-weight: 600;
        }

        .summary-box .value {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary);
        }

        /* 表格區塊 */
        .table-responsive {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
            font-size: 0.9rem;
            white-space: nowrap;
        }

        th, td {
            padding: 12px 15px;
            text-align: right;
            border-bottom: 1px solid var(--border);
        }

        th {
            background-color: var(--secondary);
            color: white;
            font-weight: 600;
            text-align: center;
            position: sticky;
            top: 0;
        }

        td:first-child, th:first-child {
            text-align: center;
        }

        tbody tr:hover {
            background-color: #f8fafc;
        }

        tbody tr:nth-child(even) {
            background-color: #fbfcfc;
        }

        .status-safe {
            color: var(--success);
            font-weight: bold;
            background: #e8f8f5;
            padding: 4px 8px;
            border-radius: 4px;
        }

        .status-danger {
            color: var(--danger);
            font-weight: bold;
            background: #fdedec;
            padding: 4px 8px;
            border-radius: 4px;
        }

        footer {
            grid-column: 1 / -1;
            text-align: center;
            margin-top: 20px;
            color: var(--text-muted);
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>FIRE 動態退休提領推估儀表板</h1>
        <p>即時試算退休年齡、資產終值與每年提領現金流</p>
    </header>

    <!-- 左側：參數設定 -->
    <div class="card">
        <h2>參數設定 <span style="font-size: 0.8rem; color: var(--text-muted); font-weight: normal;">(自動連動計算)</span></h2>
        
        <div class="input-group no-icon">
            <label>目前年齡</label>
            <div class="input-wrapper">
                <input type="number" id="currentAge" value="37" step="1">
            </div>
        </div>

        <div class="input-group">
            <label>目標資產終值 (想存到多少錢)</label>
            <div class="input-wrapper">
                <span>$</span>
                <input type="number" id="targetAsset" value="40000000" step="100000">
            </div>
        </div>

        <div class="input-group">
            <label>目前投資組合總市值</label>
            <div class="input-wrapper">
                <span>$</span>
                <input type="number" id="currentAsset" value="18667992" step="10000">
            </div>
        </div>

        <div class="input-group">
            <label>預計每年再投入金額 (不含股息)</label>
            <div class="input-wrapper">
                <span>$</span>
                <input type="number" id="annualInvestment" value="500000" step="10000">
            </div>
        </div>

        <div class="input-group no-icon">
            <label>投資組合加權年化報酬率 (%)</label>
            <div class="input-wrapper">
                <input type="number" id="portfolioReturn" value="7" step="0.1">
            </div>
        </div>

        <div class="input-group no-icon">
            <label>預估通貨膨脹率 (%)</label>
            <div class="input-wrapper">
                <input type="number" id="inflationRate" value="2" step="0.1">
            </div>
        </div>

        <div class="input-group no-icon">
            <label>退休後提領率 (安全提領) (%)</label>
            <div class="input-wrapper">
                <input type="number" id="withdrawalRate" value="4" step="0.1">
            </div>
        </div>

        <div class="input-group no-icon">
            <label>退休後保守年化報酬率 (%)</label>
            <div class="input-wrapper">
                <input type="number" id="postRetirementReturn" value="6" step="0.1">
            </div>
        </div>

        <div class="input-group no-icon">
            <label>預估壽命</label>
            <div class="input-wrapper">
                <input type="number" id="lifeExpectancy" value="85" step="1">
            </div>
        </div>
    </div>

    <!-- 右側：結果與圖表 -->
    <div style="display: flex; flex-direction: column; gap: 20px;">
        <!-- 結果摘要 -->
        <div class="card">
            <h2>退休推估結果</h2>
            <div class="summary-grid">
                <div class="summary-box">
                    <div class="title">距離達標所需年數</div>
                    <div class="value" id="resYears">0.0 年</div>
                </div>
                <div class="summary-box success">
                    <div class="title">推估可退休年齡</div>
                    <div class="value" id="resRetireAge">0 歲</div>
                </div>
                <div class="summary-box">
                    <div class="title">目標終值【等值今日購買力】</div>
                    <div class="value" id="resTargetToday">$0</div>
                </div>
                <div class="summary-box success">
                    <div class="title">退休第一年可提領金額</div>
                    <div class="value" id="resFirstWithdrawal">$0</div>
                </div>
                <div class="summary-box">
                    <div class="title">首年提領【等值今日購買力】</div>
                    <div class="value" id="resFirstWithdrawalToday">$0</div>
                </div>
            </div>
        </div>

        <!-- 提領動態表 -->
        <div class="card">
            <h2>從退休當下至預估壽命提領表 <span style="font-size: 0.8rem; color: var(--text-muted); font-weight: normal;">(模擬每年通膨與投資增長)</span></h2>
            <div class="table-responsive">
                <table>
                    <thead>
                        <tr>
                            <th>年齡</th>
                            <th>該年年初資金</th>
                            <th>當年提領金額<br><span style="font-size:0.75rem; font-weight:normal;">(隨通膨遞增)</span></th>
                            <th>提領金<br><span style="font-size:0.75rem; font-weight:normal;">【等值今日購買力】</span></th>
                            <th>當年投資孳息</th>
                            <th>年底剩餘資金</th>
                            <th>資金狀態</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                        <!-- 動態生成 -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>
    
    <footer>
        <p>Built for FIRE Financial Independence | Open Source Template</p>
    </footer>
</div>

<script>
    // 格式化貨幣的輔助函數
    const formatCurrency = (value) => {
        return new Intl.NumberFormat('zh-TW', { 
            style: 'currency', 
            currency: 'TWD', 
            maximumFractionDigits: 0 
        }).format(value);
    };

    // 核心計算與畫面更新函數
    function calculate() {
        // 取得所有參數
        const currentAge = parseFloat(document.getElementById('currentAge').value) || 0;
        const targetAsset = parseFloat(document.getElementById('targetAsset').value) || 0;
        const currentAsset = parseFloat(document.getElementById('currentAsset').value) || 0;
        const annualInvestment = parseFloat(document.getElementById('annualInvestment').value) || 0;
        const portfolioReturn = (parseFloat(document.getElementById('portfolioReturn').value) || 0) / 100;
        const inflationRate = (parseFloat(document.getElementById('inflationRate').value) || 0) / 100;
        const withdrawalRate = (parseFloat(document.getElementById('withdrawalRate').value) || 0) / 100;
        const postRetirementReturn = (parseFloat(document.getElementById('postRetirementReturn').value) || 0) / 100;
        const lifeExpectancy = parseFloat(document.getElementById('lifeExpectancy').value) || 0;

        // 計算距離達標所需年數 (利用 NPER 數學公式改寫)
        // FV = PV*(1+r)^n + PMT*(((1+r)^n - 1)/r) => 解 n
        let yearsToTarget = 0;
        if (currentAsset >= targetAsset) {
            yearsToTarget = 0;
        } else {
            if (portfolioReturn > 0) {
                const numerator = targetAsset + (annualInvestment / portfolioReturn);
                const denominator = currentAsset + (annualInvestment / portfolioReturn);
                if (numerator / denominator > 0) {
                    yearsToTarget = Math.log(numerator / denominator) / Math.log(1 + portfolioReturn);
                    yearsToTarget = Math.ceil(yearsToTarget * 10) / 10; // 無條件進位到小數第一位，匹配 Excel ROUNDUP
                } else {
                    yearsToTarget = Infinity; // 無法達成
                }
            } else {
                // 如果報酬率為 0 的純存錢計算
                yearsToTarget = (targetAsset - currentAsset) / annualInvestment;
                yearsToTarget = Math.ceil(yearsToTarget * 10) / 10;
            }
        }

        // 推估可退休年齡
        const retirementAge = currentAge + yearsToTarget;
        
        // 匯率/通膨折現計算
        const targetInTodayMoney = targetAsset / Math.pow(1 + inflationRate, yearsToTarget);
        const firstYearWithdrawal = targetAsset * withdrawalRate;
        const firstYearWithdrawalToday = firstYearWithdrawal / Math.pow(1 + inflationRate, yearsToTarget);

        // 更新摘要畫面
        document.getElementById('resYears').innerText = isFinite(yearsToTarget) ? `${yearsToTarget.toFixed(1)} 年` : '無法達成';
        document.getElementById('resRetireAge').innerText = isFinite(retirementAge) ? `${retirementAge.toFixed(1)} 歲` : '-';
        document.getElementById('resTargetToday').innerText = isFinite(targetInTodayMoney) ? formatCurrency(targetInTodayMoney) : '-';
        document.getElementById('resFirstWithdrawal').innerText = formatCurrency(firstYearWithdrawal);
        document.getElementById('resFirstWithdrawalToday').innerText = isFinite(firstYearWithdrawalToday) ? formatCurrency(firstYearWithdrawalToday) : '-';

        // 生成提領動態表
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = ''; // 清空舊資料

        if (!isFinite(retirementAge) || retirementAge > lifeExpectancy) {
            tbody.innerHTML = '<tr><td colspan="7" style="text-align:center; color: var(--text-muted);">參數設定導致無法在壽命內退休，請調整參數。</td></tr>';
            return;
        }

        // 從退休當年開始推算
        let startAge = Math.floor(retirementAge);
        let balance = targetAsset;
        let currentWithdrawal = firstYearWithdrawal;
        
        let htmlContent = '';

        for (let age = startAge; age <= lifeExpectancy; age++) {
            // 當年等值今日購買力
            const withdrawalToday = currentWithdrawal / Math.pow(1 + inflationRate, (age - currentAge));
            // 當年投資孳息 (扣除提領後才產生報酬)
            const returnAmount = Math.max(0, balance - currentWithdrawal) * postRetirementReturn;
            // 年底剩餘資金
            const endBalance = balance - currentWithdrawal + returnAmount;
            
            // 狀態判定
            const statusLabel = endBalance > 0 ? '<span class="status-safe">安全</span>' : '<span class="status-danger">資金耗盡</span>';

            htmlContent += `
                <tr>
                    <td style="text-align: center;">${age}</td>
                    <td>${formatCurrency(balance)}</td>
                    <td>${formatCurrency(currentWithdrawal)}</td>
                    <td>${formatCurrency(withdrawalToday)}</td>
                    <td>${formatCurrency(returnAmount)}</td>
                    <td>${formatCurrency(endBalance)}</td>
                    <td style="text-align: center;">${statusLabel}</td>
                </tr>
            `;

            // 為下一年準備數據
            balance = endBalance;
            currentWithdrawal = currentWithdrawal * (1 + inflationRate); // 隨通膨遞增提領

            // 如果資金已耗盡，為避免出現極端負數，可選擇在此中斷或繼續。此處與 Excel 邏輯一致，跑滿壽命。
        }

        tbody.innerHTML = htmlContent;
    }

    // 綁定所有 input 標籤的事件監聽，實現打字即時運算
    document.querySelectorAll('input').forEach(input => {
        input.addEventListener('input', calculate);
    });

    // 初始化第一次計算
    window.onload = calculate;
</script>

</body>
</html>
